# Deploy MindWeavr para VPS Hostinger via SSH (opcional).
# Deploy automático recomendado: webhook GitHub → /api/deploy-webhook (veja DEPLOY-GUIA.md).
name: Deploy to VPS

on:
  workflow_dispatch:  # só manual; deploy automático é via webhook no repo
  # push: { branches: [main] }  # desativado: use webhook para evitar timeout SSH

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            set -o pipefail
            echo "=== SSH OK. Iniciando deploy na VPS ==="
            export NVM_DIR="$HOME/.nvm"
            if ! command -v node &>/dev/null; then
              echo "Instalando Node 20 (nvm)..."
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            fi
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm install 20 2>/dev/null || true
            nvm use 20
            echo "Node: $(node -v) | npm: $(npm -v)"
            APP_DIR="$HOME/mindweavr"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            if [ -n "${{ secrets.GH_DEPLOY_TOKEN }}" ]; then
              REPO_URL="https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/${{ github.repository }}.git"
            fi
            echo "=== Clone/update repo ==="
            if [ ! -d "$APP_DIR/.git" ]; then
              [ -f "$APP_DIR/.env.local" ] && cp "$APP_DIR/.env.local" /tmp/mindweavr_env_backup || true
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
              [ -f /tmp/mindweavr_env_backup ] && cp /tmp/mindweavr_env_backup "$APP_DIR/.env.local" && echo "Restaurado .env.local" || true
            fi
            cd "$APP_DIR"
            if [ ! -f .env.local ]; then
              if [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
                echo "Criando .env.local a partir dos secrets do repo..."
                printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\nNEXT_PUBLIC_GEMINI_API_KEY=%s\nPERFECTPAY_TOKEN=%s\nNEXT_PUBLIC_APP_URL=%s\n' \
                  "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
                  "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
                  "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
                  "${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}" \
                  "${{ secrets.PERFECTPAY_TOKEN }}" \
                  "${{ secrets.NEXT_PUBLIC_APP_URL }}" > .env.local
              else
                echo "AVISO: .env.local nao existe e secrets de env nao configurados. Adicione em Settings > Secrets: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, etc. Ou crie .env.local na VPS manualmente (ssh root@VPS_HOST, cd ~/mindweavr, nano .env.local)."
              fi
            fi
            git fetch origin
            git reset --hard origin/main
            echo "=== npm ci ==="
            npm ci
            echo "=== npm run build ==="
            npm run build
            echo "=== PM2 ==="
            if command -v pm2 &>/dev/null; then
              pm2 restart mindweavr --update-env || pm2 start npm --name mindweavr -- start
              pm2 save
            else
              npm install -g pm2
              pm2 start npm --name mindweavr -- start
              pm2 save
              pm2 startup
            fi
